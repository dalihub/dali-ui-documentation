name: "Initial Full Documentation Generation"

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Target Tier'
        required: true
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all
      environment:
        description: 'LLM environment (Repo URL is auto-detected: external in CI, internal locally)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - external
      target_features:
        description: 'Comma-separated feature list to process (e.g. view,animation,image-view). Leave empty for all features.'
        required: false
        default: ''

jobs:
  generate-docs:
    runs-on: ${{ github.event.inputs.environment == 'internal' && 'code-large' || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set LLM environment
        run: |
          sed -i 's/llm_environment: ".*"/llm_environment: "${{ github.event.inputs.environment }}"/' \
            dali-doc-gen/config/doc_config.yaml
          echo "[config] llm_environment set to ${{ github.event.inputs.environment }}"

      - name: Run Pipeline (Full Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          cd dali-doc-gen
          ARGS="--mode full --tier ${{ github.event.inputs.tier }}"
          if [ -n "${{ github.event.inputs.target_features }}" ]; then
            ARGS="$ARGS --features ${{ github.event.inputs.target_features }}"
          fi
          echo "Running: python src/pipeline.py $ARGS"
          python src/pipeline.py $ARGS

      - name: Create PR to dali-ui-documentation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIER: ${{ github.event.inputs.tier }}
        run: |
          BRANCH="docs/initial-full-${TIER}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dali-doc-gen/cache/ app-guide/ platform-guide/

          # 변경사항 없으면 skip
          if [ -z "$(git status --porcelain)" ]; then
            echo "[skip] No changes. Skipping PR creation."
            exit 0
          fi

          git switch -C "$BRANCH"
          git commit -m "docs(auto): initial full generation for ${TIER}"
          git push origin "$BRANCH" --force

          gh pr create \
            --title "docs: Initial Full Generation (${TIER})" \
            --body "Generated docs + cache state. Review and merge to publish to dali-guide_auto." \
            --base main \
            --head "$BRANCH" \
          || gh pr edit "$BRANCH" \
            --body "Generated docs + cache state. (updated: $(date -u +%Y-%m-%dT%H:%M:%SZ))"
