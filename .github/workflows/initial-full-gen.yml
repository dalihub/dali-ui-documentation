name: "Initial Full Documentation Generation"

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Target Tier'
        required: true
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all
      limit:
        description: 'Test limit per pipeline (0 for unlimited)'
        required: false
        default: '0'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd dali-doc-gen
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pipeline (Full Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          cd dali-doc-gen
          python src/pipeline.py --mode full --tier ${{ github.event.inputs.tier }} --limit ${{ github.event.inputs.limit }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(auto): initial full generation for ${{ github.event.inputs.tier }}"
          title: "docs: Initial Full Generation (${{ github.event.inputs.tier }})"
          body: "Automated PR from Phase 3 initial-full-gen workflow."
          branch: "docs/initial-full-${{ github.event.inputs.tier }}"
          base: main
