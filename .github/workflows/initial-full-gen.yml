name: "Initial Full Documentation Generation"

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Target Tier'
        required: true
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all
      environment:
        description: 'LLM environment (Repo URL is auto-detected: external in CI, internal locally)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - external
      target_features:
        description: 'Comma-separated feature list to process (e.g. view,animation,image-view). Leave empty for all features.'
        required: false
        default: ''

jobs:
  generate-docs:
    runs-on: ${{ github.event.inputs.environment == 'internal' && 'code-large' || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set LLM environment
        run: |
          sed -i 's/llm_environment: ".*"/llm_environment: "${{ github.event.inputs.environment }}"/' \
            dali-doc-gen/config/doc_config.yaml
          echo "[config] llm_environment set to ${{ github.event.inputs.environment }}"

      - name: Run Pipeline (Full Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          cd dali-doc-gen
          ARGS="--mode full --tier ${{ github.event.inputs.tier }}"
          if [ -n "${{ github.event.inputs.target_features }}" ]; then
            ARGS="$ARGS --features ${{ github.event.inputs.target_features }}"
          fi
          echo "Running: python src/pipeline.py $ARGS"
          python src/pipeline.py $ARGS

      - name: Push docs to dali-guide_auto and create PR
        if: github.event.inputs.environment != 'internal'
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          TIER: ${{ github.event.inputs.tier }}
        run: |
          DOCS_REPO_URL="https://x-access-token:${DOCS_REPO_TOKEN}@github.com/dalihub/dali-guide_auto.git"
          BRANCH="docs/initial-full-${TIER}"

          # dali-guide_auto 클론 (빈 레포면 init으로 대체)
          if git clone --depth 1 "$DOCS_REPO_URL" docs-output; then
            echo "[docs] Cloned dali-guide_auto"
          else
            echo "[docs] Empty repo or clone failed — initializing"
            mkdir -p docs-output
            git -C docs-output init
            git -C docs-output remote add origin "$DOCS_REPO_URL"
          fi

          # 기존 파일 제거 후 새 결과물 복사
          rm -rf docs-output/app-guide docs-output/platform-guide docs-output/cache
          [ -d app-guide/ ]          && cp -r app-guide/          docs-output/app-guide/
          [ -d platform-guide/ ]     && cp -r platform-guide/     docs-output/platform-guide/
          [ -d dali-doc-gen/cache/ ] && cp -r dali-doc-gen/cache/ docs-output/cache/

          cd docs-output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if [ -z "$(git status --porcelain)" ]; then
            echo "[skip] No changes. Skipping PR creation."
            exit 0
          fi

          # main 없으면 직접 push (빈 레포 초기화), 있으면 브랜치 + PR
          if git ls-remote --heads origin | grep -q 'refs/heads/main'; then
            git switch -C "$BRANCH"
            git commit -m "docs(auto): initial full generation for ${TIER}"
            git push origin "$BRANCH" --force
            gh pr create \
              --repo dalihub/dali-guide_auto \
              --title "docs: Initial Full Generation (${TIER})" \
              --body "Generated docs + cache state from initial-full-gen workflow." \
              --base main \
              --head "$BRANCH" \
            || gh pr edit "$BRANCH" \
              --repo dalihub/dali-guide_auto \
              --body "Generated docs + cache state. (updated: $(date -u +%Y-%m-%dT%H:%M:%SZ))"
          else
            echo "[docs] main branch not found — pushing directly to main"
            git switch -C main
            git commit -m "docs(auto): initial full generation for ${TIER}"
            git push origin main
          fi
