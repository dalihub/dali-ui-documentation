name: "Initial Full Documentation Generation"

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Target Tier'
        required: true
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all
      environment:
        description: 'LLM environment (Repo URL is auto-detected: external in CI, internal locally)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - external
      limit:
        description: 'Test limit per pipeline (0 for unlimited)'
        required: false
        default: '0'

jobs:
  generate-docs:
    runs-on: code-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set LLM environment
        run: |
          sed -i 's/llm_environment: ".*"/llm_environment: "${{ github.event.inputs.environment }}"/' \
            dali-doc-gen/config/doc_config.yaml
          echo "[config] llm_environment set to ${{ github.event.inputs.environment }}"

      - name: Run Pipeline (Full Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          cd dali-doc-gen
          python src/pipeline.py --mode full \
            --tier ${{ github.event.inputs.tier }} \
            --limit ${{ github.event.inputs.limit }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b docs/initial-full-${{ github.event.inputs.tier }}
          git add app-guide/ platform-guide/ || echo "No guide directories to add"
          git commit -m "docs(auto): initial full generation for ${{ github.event.inputs.tier }}" || echo "No changes to commit"
          git push origin docs/initial-full-${{ github.event.inputs.tier }} --force || echo "Branch already exists or push failed"
          gh pr create --title "docs: Initial Full Generation (${{ github.event.inputs.tier }})" \
            --body "Automated PR from Phase 3 initial-full-gen workflow." \
            --base main \
            --head docs/initial-full-${{ github.event.inputs.tier }} \
            || echo "PR may already exist"
