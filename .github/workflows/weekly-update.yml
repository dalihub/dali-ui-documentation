name: "Weekly Incremental Doc Update"

on:
  schedule:
    # 매주 월요일 새벽 0시 실행 (UTC 기준)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'LLM environment (Repo URL is auto-detected: external in CI, internal locally)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - external
      tier:
        description: 'Target Tier'
        required: false
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all
      target_features:
        description: 'Comma-separated feature list to process (e.g. view,animation,image-view). Leave empty for all features.'
        required: false
        default: ''

jobs:
  update-docs:
    runs-on: ${{ (github.event.inputs.environment == 'internal' || (github.event.inputs.environment == '' && vars.DEFAULT_ENVIRONMENT == 'internal')) && 'code-large' || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set LLM environment
        run: |
          # schedule 실행 시에는 input이 없으므로 Repository Variable로 fallback
          # Settings > Variables > Actions 에서 DEFAULT_ENVIRONMENT 설정 필요
          ENV="${{ github.event.inputs.environment }}"
          ENV="${ENV:-${{ vars.DEFAULT_ENVIRONMENT }}}"
          ENV="${ENV:-external}"
          sed -i "s/llm_environment: \".*\"/llm_environment: \"$ENV\"/" \
            dali-doc-gen/config/doc_config.yaml
          echo "[config] llm_environment set to $ENV"

      - name: Restore state from dali-guide_auto
        # internal 환경에서는 사내 dali-guide_auto 미등록이므로 skip
        if: >
          github.event.inputs.environment != 'internal' &&
          !(github.event.inputs.environment == '' && vars.DEFAULT_ENVIRONMENT == 'internal')
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          DOCS_REPO_URL="https://x-access-token:${DOCS_REPO_TOKEN}@github.com/dalihub/dali-guide_auto.git"

          if git clone --depth 1 "$DOCS_REPO_URL" dali-guide-state; then
            [ -d dali-guide-state/cache/ ]           && cp -r dali-guide-state/cache/           dali-doc-gen/cache/
            [ -d dali-guide-state/app-guide/ ]       && cp -r dali-guide-state/app-guide/       app-guide/
            [ -d dali-guide-state/platform-guide/ ]  && cp -r dali-guide-state/platform-guide/  platform-guide/
            echo "[state] Restored cache, app-guide, platform-guide from dali-guide_auto"
          else
            echo "[state] dali-guide_auto clone failed or empty — pipeline will run full regeneration"
          fi

      - name: Run Pipeline (Update Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          # input 우선, 없으면 Repository Variable fallback, 그것도 없으면 기본값
          TIER="${{ github.event.inputs.tier }}"
          TIER="${TIER:-${{ vars.WEEKLY_TIER }}}"
          TIER="${TIER:-all}"

          FEATURES="${{ github.event.inputs.target_features }}"
          FEATURES="${FEATURES:-${{ vars.WEEKLY_FEATURES }}}"

          cd dali-doc-gen
          ARGS="--mode update --tier $TIER"
          if [ -n "$FEATURES" ]; then
            ARGS="$ARGS --features $FEATURES"
          fi
          echo "Running: python src/pipeline.py $ARGS"
          python src/pipeline.py $ARGS

      - name: Push docs to dali-guide_auto and create PR
        # internal 환경에서는 사내 dali-guide_auto 미등록이므로 skip
        if: >
          github.event.inputs.environment != 'internal' &&
          !(github.event.inputs.environment == '' && vars.DEFAULT_ENVIRONMENT == 'internal')
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          DOCS_REPO_URL="https://x-access-token:${DOCS_REPO_TOKEN}@github.com/dalihub/dali-guide_auto.git"
          BRANCH="docs/weekly-update"

          # dali-guide_auto 클론 (이미 dali-guide-state로 클론됐으면 재사용)
          if [ -d dali-guide-state/.git ]; then
            cp -r dali-guide-state docs-output
          elif git clone --depth 1 "$DOCS_REPO_URL" docs-output; then
            echo "[docs] Cloned dali-guide_auto"
          else
            mkdir -p docs-output
            git -C docs-output init
            git -C docs-output remote add origin "$DOCS_REPO_URL"
          fi

          # 기존 파일 제거 후 새 결과물 복사
          rm -rf docs-output/app-guide docs-output/platform-guide docs-output/cache
          [ -d app-guide/ ]          && cp -r app-guide/          docs-output/app-guide/
          [ -d platform-guide/ ]     && cp -r platform-guide/     docs-output/platform-guide/
          [ -d dali-doc-gen/cache/ ] && cp -r dali-doc-gen/cache/ docs-output/cache/

          cd docs-output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if [ -z "$(git status --porcelain)" ]; then
            echo "[skip] No changes. Skipping PR creation."
            exit 0
          fi

          # main 없으면 직접 push (빈 레포 초기화), 있으면 브랜치 + PR
          if git ls-remote --heads origin | grep -q 'refs/heads/main'; then
            git switch -C "$BRANCH"
            git commit -m "docs(auto): weekly incremental update"
            git push origin "$BRANCH" --force
            gh pr create \
              --repo dalihub/dali-guide_auto \
              --title "docs(auto): Weekly Incremental Update Sync" \
              --body "Generated docs + cache state from weekly-update workflow." \
              --base main \
              --head "$BRANCH" \
            || gh pr edit "$BRANCH" \
              --repo dalihub/dali-guide_auto \
              --body "Generated docs + cache state. (updated: $(date -u +%Y-%m-%dT%H:%M:%SZ))"
          else
            echo "[docs] main branch not found — pushing directly to main"
            git switch -C main
            git commit -m "docs(auto): weekly incremental update"
            git push origin main
          fi
