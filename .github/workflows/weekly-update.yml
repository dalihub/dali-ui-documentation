name: "Weekly Incremental Doc Update"

on:
  schedule:
    # 매주 월요일 새벽 0시 실행 (UTC 기준)
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set environment to external
        run: |
          sed -i 's/llm_environment: "internal"/llm_environment: "external"/' \
            dali-doc-gen/config/doc_config.yaml

      - name: Run Pipeline (Update Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          cd dali-doc-gen
          python src/pipeline.py --mode update --tier all

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(auto): weekly incremental update"
          title: "docs(auto): Weekly Incremental Update Sync"
          body: "Automated PR from weekly-update pipeline. This captures API deltas and newly generated structural documentation."
          branch: "docs/weekly-update"
          base: main
