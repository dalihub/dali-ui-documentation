name: "Weekly Incremental Doc Update"

on:
  schedule:
    # 매주 월요일 새벽 0시 실행 (UTC 기준)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'LLM environment (Repo URL is auto-detected: external in CI, internal locally)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - external
      tier:
        description: 'Target Tier'
        required: false
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all

jobs:
  update-docs:
    runs-on: ${{ (github.event.inputs.environment == 'internal' || (github.event.inputs.environment == '' && vars.DEFAULT_ENVIRONMENT == 'internal')) && 'code-large' || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set LLM environment
        run: |
          # schedule 실행 시에는 input이 없으므로 Repository Variable로 fallback
          # Settings > Variables > Actions 에서 DEFAULT_ENVIRONMENT 설정 필요
          ENV="${{ github.event.inputs.environment }}"
          ENV="${ENV:-${{ vars.DEFAULT_ENVIRONMENT }}}"
          ENV="${ENV:-external}"
          sed -i "s/llm_environment: \".*\"/llm_environment: \"$ENV\"/" \
            dali-doc-gen/config/doc_config.yaml
          echo "[config] llm_environment set to $ENV"

      - name: Run Pipeline (Update Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          TIER="${{ github.event.inputs.tier }}"
          TIER="${TIER:-all}"
          cd dali-doc-gen
          python src/pipeline.py --mode update --tier $TIER

      - name: Push docs to dali-guide_auto and create PR
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          DOCS_REPO_URL="https://x-access-token:${DOCS_REPO_TOKEN}@github.com/dalihub/dali-guide_auto.git"
          BRANCH="docs/weekly-update"

          # docs 레포 클론 (빈 레포면 git init으로 대체)
          if git clone --depth 1 "$DOCS_REPO_URL" docs-output; then
            echo "[docs] Cloned dali-guide_auto"
          else
            echo "[docs] Empty repo or clone failed — initializing"
            mkdir -p docs-output
            git -C docs-output init
            git -C docs-output remote add origin "$DOCS_REPO_URL"
          fi

          # 기존 docs 제거 후 새 docs 복사 (삭제된 피처 반영)
          rm -rf docs-output/app-guide docs-output/platform-guide
          [ -d app-guide/ ]      && cp -r app-guide/      docs-output/
          [ -d platform-guide/ ] && cp -r platform-guide/ docs-output/

          cd docs-output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          # 변경사항 없으면 skip
          if [ -z "$(git status --porcelain)" ]; then
            echo "[skip] No changes to docs. Skipping PR creation."
            exit 0
          fi

          # main 없으면 직접 push, 있으면 브랜치 + PR
          if git ls-remote --heads origin | grep -q 'refs/heads/main'; then
            git switch -C "$BRANCH"
            git commit -m "docs(auto): weekly incremental update"
            git push origin "$BRANCH" --force
            gh pr create \
              --repo dalihub/dali-guide_auto \
              --title "docs(auto): Weekly Incremental Update Sync" \
              --body "Automated PR from weekly-update pipeline. This captures API deltas and newly generated structural documentation." \
              --base main \
              --head "$BRANCH" \
            || gh pr edit "$BRANCH" \
              --repo dalihub/dali-guide_auto \
              --body "Automated PR from weekly-update pipeline. (updated: $(date -u +%Y-%m-%dT%H:%M:%SZ))"
          else
            echo "[docs] main branch not found — pushing directly to main"
            git switch -C main
            git commit -m "docs(auto): weekly incremental update"
            git push origin main
          fi
