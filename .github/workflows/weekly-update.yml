name: "Weekly Incremental Doc Update"

on:
  schedule:
    # 매주 월요일 새벽 0시 실행 (UTC 기준)
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'LLM environment (Repo URL is auto-detected: external in CI, internal locally)'
        required: true
        default: 'internal'
        type: choice
        options:
        - internal
        - external
      tier:
        description: 'Target Tier'
        required: false
        default: 'all'
        type: choice
        options:
        - app
        - platform
        - all

jobs:
  update-docs:
    runs-on: code-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Doxygen)
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set LLM environment
        run: |
          # schedule 실행 시에는 input이 없으므로 Repository Variable로 fallback
          # Settings > Variables > Actions 에서 DEFAULT_ENVIRONMENT 설정 필요
          ENV="${{ github.event.inputs.environment }}"
          ENV="${ENV:-${{ vars.DEFAULT_ENVIRONMENT }}}"
          ENV="${ENV:-external}"
          sed -i "s/llm_environment: \".*\"/llm_environment: \"$ENV\"/" \
            dali-doc-gen/config/doc_config.yaml
          echo "[config] llm_environment set to $ENV"

      - name: Run Pipeline (Update Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          TIER="${{ github.event.inputs.tier }}"
          TIER="${TIER:-all}"
          cd dali-doc-gen
          python src/pipeline.py --mode update --tier $TIER

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b docs/weekly-update
          git add app-guide/ platform-guide/ || echo "No guide directories to add"
          git commit -m "docs(auto): weekly incremental update" || echo "No changes to commit"
          git push origin docs/weekly-update --force || echo "Branch already exists or push failed"
          gh pr create --title "docs(auto): Weekly Incremental Update Sync" \
            --body "Automated PR from weekly-update pipeline. This captures API deltas and newly generated structural documentation." \
            --base main \
            --head docs/weekly-update \
            || echo "PR may already exist"
