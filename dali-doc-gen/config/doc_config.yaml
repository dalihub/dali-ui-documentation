llm_environment: "external" # Toggle between "internal" and "external"

# ============================================================
# Feature-specific hints injected into Stage B (TOC design)
# and Stage C (document generation) prompts.
# extra_context is free-form text appended to the prompt for
# the named feature only — other features are unaffected.
# ============================================================
feature_hints:
  view:
    extra_context: |
      View supports Fluent API through method chaining. All property setters return
      View& (or the concrete subclass &) so they can be chained together.
      IMPORTANT: Include a dedicated section explaining the method chaining pattern.
      Show declarative UI tree construction using Children({...}), AsInteractive(lambda),
      AsSelectable(lambda), With(lambda), and As(view&) methods.
      Always prefer chained initialization style over separate-statement style in examples.

  image-view:
    extra_context: |
      ImageView displays ONLY static image formats (e.g. PNG, JPEG, BMP, SVG).
      It does NOT support animated formats such as GIF or WEBP.
      Do NOT describe or imply any animated image playback capability for ImageView.

  animated-image-view:
    extra_context: |
      AnimatedImageView supports GIF and WEBP animated image formats.
      It does NOT support APNG. Do NOT mention APNG under any circumstances.

  absolute-layout:
    extra_context: |
      For AbsoluteLayoutParams, you can use either 'SetBounds()' OR the individual setters ('SetX()', 'SetY()', 'SetWidth()', 'SetHeight()').
      IMPORTANT: Do NOT mix them together in the same code example or on the same object.
      Use one approach exclusively to keep code snippets redundance-free and idiomatic.
      CRITICAL: To apply layout parameters to a View, use 'parentView.SetLayoutParams(params)' —
      NOT SetLayout(), SetLayoutMode(), or SetLayoutParameters(). The exact method name on View
      is 'SetLayoutParams'. Any other name will cause a fatal validation failure.

  layouts:
    extra_context: |
      CRITICAL: If example code needs to apply a layout to a View, use 'parentView.SetLayoutParams(params)' —
      NOT SetLayout(), SetLayoutMode(), or SetLayoutParameters(). The exact method name on View
      is 'SetLayoutParams'. Any other name will cause a fatal validation failure.

  flex-layout:
    extra_context: |
      CRITICAL: If example code needs to apply a layout to a View, use 'parentView.SetLayoutParams(params)' —
      NOT SetLayout(), SetLayoutMode(), or SetLayoutParameters(). The exact method name on View
      is 'SetLayoutParams'. Any other name will cause a fatal validation failure.

  grid-layout:
    extra_context: |
      CRITICAL: If example code needs to apply a layout to a View, use 'parentView.SetLayoutParams(params)' —
      NOT SetLayout(), SetLayoutMode(), or SetLayoutParameters(). The exact method name on View
      is 'SetLayoutParams'. Any other name will cause a fatal validation failure.

token_overflow:
  # feature_clusterer: 이 스펙 수 초과 시 oversized 마킹 및 후보 그룹 계산
  max_specs_per_feature: 2000

  # stage_c_writer: 이 토큰 수 초과 시 롤링 정제 모드 전환 (taxonomy oversized_single 무관하게 fallback)
  spec_token_threshold: 60000

  # 사내 LLM 컨텍스트 한도 (131,072에서 안전 마진 적용)
  context_limit: 120000

  # 프롬프트 고정 텍스트 + system instructions 토큰 추정치
  prompt_overhead: 4000

models:
  internal:
    api_base: "https://inference-webtrial-api.shuttle.sr-cloud.com"
    think_endpoint: "gauss2-3-37b-think"
    instruct_endpoint: "gauss2-3-37b-instruct"
    think: "gauss2.3-37b-think"
    instruct: "gauss2.3-37b"
    api_key_env: "INTERNAL_API_KEY" # Base64 encoded "ACCESS_KEY:SECRET_KEY"
    auth_type: "basic" # Shuttle API uses Basic Auth
    rate_limit_delay_sec: 4 # ~15 RPM for safety (API limit: 20 RPM)
    max_retries: 10
    
  external:
    api_base: "https://generativelanguage.googleapis.com/v1beta/models"
    think: "gemini-3.1-flash-lite-preview"
    instruct: "gemini-3.1-flash-lite-preview"
    api_key_env: "GEMINI_API_KEY"
    rate_limit_delay_sec: 6        # 최소 요청 간격 (초) — 토큰 제한과 함께 적용
    tokens_per_minute: 250000      # Gemini free tier 분당 입력 토큰 한도
    max_retries: 10

# ── 공통 코드 관용 패턴 (stage_c Pass 1 프롬프트에 주입) ─────────────────────────
# 실제 DALi 헤더 기준으로 검토 후 수정하세요. (devel-note/TODO.md 참고)
code_patterns: |
  // ── Animation (property 기반 값 변경) ──────────────────────────────
  Dali::Animation anim = Dali::Animation::New(1.0f);  // duration in seconds
  anim.AnimateTo(Dali::Property(view, Dali::Actor::Property::POSITION),
                 Dali::Vector3(200.0f, 0.0f, 0.0f));
  anim.Play();

  // ── Property 설정 (전용 setter 우선, SetProperty는 fallback) ─────────
  // Preferred: 전용 setter 사용
  imageView.SetProperty(Dali::Ui::ImageView::Property::RESOURCE_URL, url);
  // Fallback: 전용 setter가 없는 경우에만
  view.SetProperty(Dali::Actor::Property::SIZE, Dali::Vector2(width, height));
