llm_environment: "internal" # Toggle between "internal" and "external"

models:
  internal:
    api_base: "https://inference-webtrial-api.shuttle.sr-cloud.com"
    think_endpoint: "gauss2-3-37b-think"
    instruct_endpoint: "gauss2-3-37b-instruct"
    think: "gauss2.3-37b-think"
    instruct: "gauss2.3-37b"
    api_key_env: "INTERNAL_API_KEY" # Base64 encoded "ACCESS_KEY:SECRET_KEY"
    auth_type: "basic" # Shuttle API uses Basic Auth
    rate_limit_delay_sec: 4 # ~15 RPM for safety (API limit: 20 RPM)
    max_retries: 10
    
  external:
    api_base: "https://generativelanguage.googleapis.com/v1beta/models"
    think: "gemini-3.1-flash-lite-preview"
    instruct: "gemini-3.1-flash-lite-preview"
    api_key_env: "GEMINI_API_KEY"
    rate_limit_delay_sec: 6
    max_retries: 10
