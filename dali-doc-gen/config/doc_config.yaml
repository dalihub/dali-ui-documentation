llm_environment: "external" # Toggle between "internal" and "external"

models:
  internal:
    api_base: "http://internal.company.api/v1/generate"
    think: "custom-samsung-think-model"
    instruct: "custom-samsung-instruct-model"
    api_key_env: "INTERNAL_API_KEY" # Name of the shell/env variable holding the key
    rate_limit_delay_sec: 6 # E.g., 6 seconds delay for 10 requests per minute
    max_retries: 5
    
  external:
    api_base: "https://generativelanguage.googleapis.com/v1beta/models"
    think: "gemini-2.0-flash" # Powerful thinking model
    instruct: "gemini-2.0-flash" # Faster, cheaper drafting model
    api_key_env: "GEMINI_API_KEY"
    rate_limit_delay_sec: 6 # Safety threshold for Google Free Tier ~15 RPM
    max_retries: 3
